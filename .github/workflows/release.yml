name: 发布 Obsidian 插件

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Package plugin files
        run: |
          mkdir dist
          cp .obsidian/plugins/ai-novelist-studio/main.js dist/
          cp .obsidian/plugins/ai-novelist-studio/manifest.json dist/
          cp .obsidian/plugins/ai-novelist-studio/styles.css dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
